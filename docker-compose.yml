version: '3.8'

services:
  scylla:
    image: scylladb/scylla:6.2.3
    container_name: scylla
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --smp 1

  mailhog:
    image: mailhog/mailhog
    ports:
      - 1025:1025
      - 8025:8025

  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]
    volumes:
      - data-minio:/data
    environment:
      MINIO_ROOT_USER: miniopass
      MINIO_ROOT_PASSWORD: miniopass
      MINIO_DEFAULT_BUCKETS: zinq

  minio-buckets:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set dockerminio http://minio:9000 miniopass miniopass;
      /usr/bin/mc mb dockerminio/zinq;
      /usr/bin/mc anonymous set public dockerminio/zinq;
      exit 0;
      "

volumes:
  scylla_data:
  data-minio:
